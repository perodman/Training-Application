<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>LIFT Tracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="global-home" class="circle-ctrl">🏠</div>
    <div class="app-container">
        <div id="home-view" class="view">
            <div class="hero-section">
                <h1 class="main-title">LIFT</h1>
                <p class="subtitle">Elevate Your Strength</p>
            </div>
            <div id="draft-alert" class="hidden">
                <button id="resume-workout-btn" class="mode-btn orange">Fortsätt träningen ⏱️</button>
            </div>
            <div class="menu-grid">
                <button id="start-new-btn" class="mode-btn blue main-action">Starta Träningspass 🔥</button>
                <button id="view-programs-btn" class="mode-btn glass-border">Träningsprogram 💎</button>
                <button id="view-exercises-btn" class="mode-btn glass-border">Övningsbank 🏆</button>
                <button id="calendar-mode" class="mode-btn glass-border">Dagbok & Schema 📅</button>
            </div>
        </div>
        <div id="calendar-view" class="view hidden"></div>
        <div id="programs-view" class="view hidden">
            <h2 class="section-title">Program</h2>
            <div id="pass-selector-list" class="program-modern-grid"></div>
            <div id="program-details-area" class="hidden">
                <div id="program-exercise-list"></div>
            </div>
        </div>
        <div id="workout-view" class="view hidden">
            <div class="glass card timer-container">
                <h2 id="active-title">Pass</h2>
                <div id="workout-timer" class="timer-display">00:00:00</div>
            </div>
            <div id="exercise-list"></div>
        </div>
    </div>
    <div id="workout-modal" class="modal hidden">
        <div class="modal-content">
            <div id="modal-body"></div>
            <button class="mode-btn glass-border" onclick="closeModal()" style="margin-top:15px;">Stäng</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
