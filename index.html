<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>LIFT Tracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="global-header">
        <div id="global-home" class="circle-ctrl">🏠</div>
    </div>

    <div class="app-container">
        <div id="home-view" class="view">
            <div class="hero-section">
                <h1 class="main-title">LIFT</h1>
                <p class="subtitle">Elevate Your Strength</p>
            </div>
            <div id="draft-alert" class="hidden">
                <button id="resume-workout-btn" class="mode-btn orange">Fortsätt träningen ⏱️</button>
            </div>
            <div class="menu-grid">
                <button id="start-new-btn" class="mode-btn blue main-action">Starta Träningspass 🔥</button>
                <button id="view-programs-btn" class="mode-btn glass-border">Träningsprogram 💎</button>
                <button id="view-exercises-btn" class="mode-btn glass-border">Övningsbank 🏆</button>
                <button id="calendar-mode" class="mode-btn glass-border">Dagbok & Schema 📅</button>
                <button id="stats-mode" class="mode-btn glass-border">Statistik 📊</button>
            </div>
        </div>

        <div id="calendar-view" class="view hidden"></div>

        <div id="exercises-view" class="view hidden">
            <h2 class="section-title">Övningar</h2>
            <div class="category-grid" style="margin-bottom: 20px;">
                <div class="cat-btn active" data-cat="Ben"><span>Ben</span></div>
                <div class="cat-btn" data-cat="Rygg"><span>Rygg</span></div>
                <div class="cat-btn" data-cat="Bröst"><span>Bröst</span></div>
                <div class="cat-btn" data-cat="Axlar"><span>Axlar</span></div>
                <div class="cat-btn" data-cat="Armar"><span>Armar</span></div>
                <div class="cat-btn" data-cat="Bål"><span>Bål</span></div>
            </div>
            <div id="exercise-results"></div>
            <button id="add-master-ex-btn" class="mode-btn blue">+ Skapa ny övning</button>
        </div>

        <div id="programs-view" class="view hidden">
            <h2 class="section-title">Dina Program</h2>
            <div id="pass-selector-list" class="program-modern-grid"></div>
            <div id="program-details-area" class="hidden" style="margin-top:30px;">
                <div id="program-exercise-list"></div>
            </div>
        </div>

        <div id="workout-view" class="view hidden">
            <div class="glass card" style="text-align:center; margin-bottom:20px;">
                <h2 id="active-title" style="margin:0;">Pass</h2>
                <div id="workout-timer" class="timer-display">00:00:00</div>
                <button id="timer-toggle-btn" class="mode-btn glass-border" style="width:auto; margin:auto; padding:5px 15px;">Pausa ⏸️</button>
            </div>
            <div id="exercise-list"></div>
        </div>

        <div id="stats-view" class="view hidden">
            <h2 class="section-title">Din Utveckling</h2>
            <div class="glass card">
                <div id="chart-container" class="chart-wrapper"></div>
            </div>
        </div>
    </div>

    <div id="workout-modal" class="modal hidden">
        <div class="modal-content">
            <div id="modal-body"></div>
            <button class="mode-btn glass-border" onclick="closeModal()" style="margin-top:10px;">Stäng</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
