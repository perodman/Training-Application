<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIFT Tracker Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="global-header">
    <div id="global-home" class="circle-ctrl">🏠</div>
  </div>

  <div class="app-container">
    <!-- HEMSKÄRM -->
    <div id="home-view" class="view">
      <h1 class="main-title">LIFT</h1>
      <p class="subtitle">Gym & Progress</p>
      
      <div id="draft-alert" class="hidden" style="margin-bottom: 20px;">
        <button id="resume-workout-btn" class="mode-btn orange">Fortsätt träningen ⏱️</button>
      </div>

      <button id="start-new-btn" class="mode-btn blue">Starta Nytt Pass 🔥</button>
      <button id="view-exercises-btn" class="mode-btn indigo">🏋️ Övningar</button>
      <button id="view-programs-btn" class="mode-btn indigo">📋 Träningsprogram</button>
      <button id="calendar-mode" class="mode-btn gray">📅 Månadsschema</button>
      <button id="stats-mode" class="mode-btn gray">📊 Statistik</button>
    </div>

    <!-- KALENDER -->
    <div id="calendar-view" class="view hidden">
      <div class="calendar-nav">
        <button onclick="changeMonth(-1)" class="nav-arrow">❮</button>
        <h2 id="month-label"></h2>
        <button onclick="changeMonth(1)" class="nav-arrow">❯</button>
      </div>
      <div class="card calendar-card">
        <div class="calendar-weekdays">
          <span>Mån</span><span>Tis</span><span>Ons</span><span>Tor</span><span>Fre</span><span>Lör</span><span>Sön</span>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
        <div class="legend">
          <div class="legend-item"><div class="legend-color cell-planned"></div> Planerat</div>
          <div class="legend-item"><div class="legend-color cell-ongoing"></div> Pågående</div>
          <div class="legend-item"><div class="legend-color cell-completed"></div> Genomfört</div>
        </div>
      </div>
    </div>

    <!-- ÖVNINGAR -->
    <div id="exercises-view" class="view hidden">
      <h2 class="section-title">Muskelgrupper</h2>
      <div id="category-menu" class="category-grid">
        <button class="cat-btn" data-cat="Ben" onclick="filterExercises('Ben')">🦵 Ben</button>
        <button class="cat-btn" data-cat="Bröst" onclick="filterExercises('Bröst')">👕 Bröst</button>
        <button class="cat-btn" data-cat="Rygg" onclick="filterExercises('Rygg')">👐 Rygg</button>
        <button class="cat-btn" data-cat="Axlar" onclick="filterExercises('Axlar')">🛡️ Axlar</button>
        <button class="cat-btn" data-cat="Armar" onclick="filterExercises('Armar')">💪 Armar</button>
        <button class="cat-btn" data-cat="Bål" onclick="filterExercises('Bål')">🧘 Bål</button>
      </div>
      
      <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 30px; margin-bottom: 20px;">
        <h2 class="section-title" style="margin: 0;">Övningar</h2>
        <button class="circle-ctrl" style="width: 30px; height: 30px; border-radius: 10px; font-size: 18px; font-weight: 900; color: var(--success);" onclick="openCreateExerciseModal()">+</button>
      </div>
      
      <div id="exercise-results" class="exercise-bank-list"></div>
    </div>

    <!-- TRÄNINGSPROGRAM -->
    <div id="programs-view" class="view hidden">
      <h2 class="section-title">Träningsprogram</h2>
      <div id="pass-selector-list" class="pass-selector"></div>
      <div id="program-exercise-list" class="card hidden"></div>
      <button id="add-custom-pass-btn" class="mode-btn gray" style="margin-top:20px;">+ Skapa Nytt Pass</button>
    </div>

    <!-- STATISTIK -->
    <div id="stats-view" class="view hidden">
      <h2 class="section-title">Statistik</h2>
      <div class="card">
        <h3>Pass per månad</h3>
        <div id="chart-container" class="chart-wrapper"></div>
      </div>
    </div>

    <!-- TRÄNINGS-VY -->
    <div id="workout-view" class="view hidden">
      <h2 id="active-title" style="text-align: center;"></h2>
      <div id="exercise-list"></div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button id="pause-workout-btn" class="mode-btn orange">Spara utkast</button>
        <button id="save-workout-btn" class="mode-btn green">Avsluta pass</button>
      </div>
    </div>
  </div>

  <div id="workout-modal" class="modal hidden">
    <div class="modal-content">
      <div id="modal-body"></div>
      <button class="mode-btn gray" onclick="closeModal()">Stäng</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
