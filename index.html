<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>LIFT Tracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="global-home" class="circle-ctrl">🏠</div>
    
    <div class="app-container">
        <!-- STARTVY -->
        <div id="home-view" class="view">
            <h1 style="text-align:center; font-family:'Montserrat'; font-size:3.5rem; margin:0; letter-spacing:-2px;">LIFT</h1>
            <p style="text-align:center; color:var(--primary); letter-spacing:4px; font-size:10px; margin-bottom:40px; font-weight:800;">ELEVATE YOUR STRENGTH</p>
            
            <div id="draft-alert" class="hidden">
                <button id="resume-workout-btn" class="mode-btn orange">Fortsätt Träningen ⏱️</button>
            </div>
            
            <div class="menu-grid">
                <button id="start-new-btn" class="mode-btn blue">Starta Träningspass 🔥</button>
                <button id="calendar-mode" class="mode-btn glass">Träningsdagbok 📅</button>
                <button id="view-exercises-btn" class="mode-btn glass">Övningsbank 🏋️</button>
                <button id="view-programs-btn" class="mode-btn glass">Mina Program 📋</button>
                <button id="stats-mode" class="mode-btn glass">Statistik 📊</button>
            </div>
        </div>

        <!-- KALENDER -->
        <div id="calendar-view" class="view hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <button onclick="changeMonth(-1)" class="nav-arrow glass-border" style="padding:10px; border-radius:12px;">❮</button>
                <h2 id="month-label" style="margin:0; font-family:'Montserrat';"></h2>
                <button onclick="changeMonth(1)" class="nav-arrow glass-border" style="padding:10px; border-radius:12px;">❯</button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>

        <!-- WORKOUT -->
        <div id="workout-view" class="view hidden">
            <h2 id="active-title" style="text-align:center; color:var(--primary); font-family:'Montserrat';"></h2>
            <div class="glass">
                <div id="workout-timer" class="timer-display">00:00:00</div>
                <button id="timer-toggle-btn" class="mode-btn glass-border">Pausa ⏸️</button>
            </div>
            <div id="exercise-list"></div>
            <button id="save-workout-btn" class="mode-btn green">Avsluta & Spara</button>
            <button id="exit-workout-btn" class="mode-btn glass-border">Gå Hem (Klockan fortsätter)</button>
        </div>

        <!-- ÖVNINGSBANK & PROGRAM (Samma logik som tidigare) -->
        <div id="exercises-view" class="view hidden"></div>
        <div id="programs-view" class="view hidden"></div>
        <div id="stats-view" class="view hidden"></div>
    </div>

    <!-- MODAL -->
    <div id="workout-modal" class="modal hidden">
        <div class="modal-content">
            <div id="modal-body"></div>
            <button class="mode-btn glass-border" onclick="closeModal()" style="margin-top:20px;">Stäng</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
