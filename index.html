<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Träningsapp</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div id="home-view" class="view">
            <header>
                <h1 class="logo">TRAIN<span>AI</span></h1>
                <p class="subtitle">Din personliga träningsresa</p>
            </header>

            <div class="stats-grid">
                <div class="stat-card glass home-gradient-soft" id="stat-workouts">
                    <span class="stat-value">0</span>
                    <span class="stat-label">Pass</span>
                </div>
                <div class="stat-card glass home-gradient-soft" id="stat-streak">
                    <span class="stat-value">0</span>
                    <span class="stat-label">Dagar</span>
                </div>
            </div>

            <button class="main-action-btn home-main-gradient" onclick="renderCalendar(true)">
                <div class="btn-content">
                    <span class="btn-icon">🚀</span>
                    <div class="btn-text">
                        <strong>Starta Träningspass</strong>
                        <span>Välj ett pass från ditt schema</span>
                    </div>
                </div>
            </button>

            <div class="menu-grid">
                <button class="menu-item glass home-gradient-soft" onclick="renderCalendar()">
                    <span class="menu-icon">📅</span>
                    <span>Schema</span>
                </button>
                <button class="menu-item glass home-gradient-soft" onclick="renderProgramView()">
                    <span class="menu-icon">📋</span>
                    <span>Program</span>
                </button>
                <button class="menu-item glass home-gradient-soft" onclick="filterExercises('Ben')">
                    <span class="menu-icon">💪</span>
                    <span>Övningar</span>
                </button>
                <button class="menu-item glass home-gradient-soft" onclick="renderHistory()">
                    <span class="menu-icon">📈</span>
                    <span>Historik</span>
                </button>
            </div>
        </div>

        <div id="calendar-view" class="view hidden">
            <div class="view-header">
                <button class="back-btn" onclick="showView('home-view')">←</button>
                <h2 id="month-label" onclick="openMonthPicker()" style="cursor:pointer">Maj 2024 ▾</h2>
            </div>
            <div id="calendar-info-box"></div>
            <div class="calendar-days">
                <span>Mån</span><span>Tis</span><span>Ons</span><span>Tor</span><span>Fre</span><span>Lör</span><span>Sön</span>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
        </div>

        <div id="programs-view" class="view hidden">
            <div class="view-header">
                <button class="back-btn" onclick="showView('home-view')">←</button>
                <h2>Mina Program</h2>
                <button class="add-btn" onclick="openCreateProgramModal()">+</button>
            </div>
            <div id="pass-selector-list" class="pass-selector-list"></div>
            <div id="program-details-area" class="hidden">
                <div id="program-exercise-list" class="card glass" style="margin-top:20px;"></div>
            </div>
        </div>

        <div id="exercises-view" class="view hidden">
            <div class="view-header">
                <button class="back-btn" onclick="showView('home-view')">←</button>
                <h2>Övningsbank</h2>
                <button class="add-btn" onclick="openCreateExerciseModal()">+</button>
            </div>
            <div class="category-scroll">
                <button class="cat-btn active" data-cat="Ben" onclick="filterExercises('Ben')">Ben</button>
                <button class="cat-btn" data-cat="Bröst" onclick="filterExercises('Bröst')">Bröst</button>
                <button class="cat-btn" data-cat="Rygg" onclick="filterExercises('Rygg')">Rygg</button>
                <button class="cat-btn" data-cat="Axlar" onclick="filterExercises('Axlar')">Axlar</button>
                <button class="cat-btn" data-cat="Armar" onclick="filterExercises('Armar')">Armar</button>
                <button class="cat-btn" data-cat="Bål" onclick="filterExercises('Bål')">Bål</button>
            </div>
            <div id="exercise-results"></div>
        </div>

        <div id="workout-view" class="view hidden">
            <div class="view-header" style="justify-content: space-between; align-items: center;">
                <div id="active-header-row" style="display:flex; align-items:center; width:100%; gap:10px;">
                    <h2 id="active-title" class="section-title modern-header" style="margin-bottom:0; flex-grow:1;">Pass A</h2>
                </div>
            </div>

            <div id="timer-card" class="timer-card glass">
                <div id="workout-timer" class="timer-display">00:00:00</div>
                <button id="timer-toggle-btn" class="mode-btn">Pausa ⏸️</button>
            </div>

            <div id="exercise-list"></div>

            <div class="workout-footer">
                <button id="pause-workout-btn" class="mode-btn">Pausa</button>
                <button class="mode-btn blue" onclick="finishWorkout()">Avsluta Pass</button>
            </div>
        </div>

        <div id="history-view" class="view hidden">
            <div class="view-header">
                <button class="back-btn" onclick="showView('home-view')">←</button>
                <h2>Historik</h2>
            </div>
            <div id="history-list"></div>
        </div>

        <div id="workout-modal" class="modal hidden">
            <div class="modal-content glass">
                <div id="modal-body"></div>
                <button class="close-modal-btn" onclick="closeModal()">Stäng</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
