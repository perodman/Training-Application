<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Träningsapp Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HOME VIEW -->
    <div id="home-view" class="view">
        <header>
            <h1>MIN TRÄNING</h1>
            <p>Välkommen tillbaka!</p>
        </header>

        <div id="draft-alert" class="card glass hidden" style="border-left: 4px solid var(--orange);">
            <p style="margin:0; font-size:14px;">Du har ett pågående pass!</p>
            <button id="resume-workout-btn" class="mode-btn orange" style="margin-top:10px;">Återuppta pass</button>
        </div>

        <section>
            <h2 class="section-title">SCHEMA</h2>
            <button id="start-new-btn" class="mode-btn blue">📅 Öppna Träningsschema</button>
        </section>

        <section style="margin-top:20px;">
            <h2 class="section-title">FRITT PASS</h2>
            <button id="start-free-btn" class="mode-btn green">STARTA TRÄNINGSPASSET 🔥</button>
        </section>
    </div>

    <!-- CALENDAR VIEW -->
    <div id="calendar-view" class="view hidden">
        <header>
            <button class="back-btn" id="global-home">← Hem</button>
            <h1 id="month-label" onclick="openMonthPicker()">Månad</h1>
        </header>
        
        <!-- DENNA RUTAN MÅSTE FINNAS FÖR ATT KODEN INTE SKA KRASCHA -->
        <div id="calendar-info-box" class="card glass hidden" style="background: rgba(56, 189, 248, 0.2); border: 1px solid var(--primary); margin: 10px 20px;">
            <p style="margin:0; font-size:14px; text-align:center; color: var(--primary); font-weight: bold;">
                📍 Välj dag för ditt träningspass
            </p>
        </div>

        <div class="calendar-nav">
            <button onclick="changeMonth(-1)"> Förra </button>
            <button onclick="changeMonth(1)"> Nästa </button>
        </div>
        <div class="calendar-days">
            <div>MÅN</div><div>TIS</div><div>ONS</div><div>TOR</div><div>FRE</div><div>LÖR</div><div>SÖN</div>
        </div>
        <div id="calendar-grid" class="calendar-grid"></div>
    </div>

    <!-- WORKOUT VIEW (AKTIVT PASS) -->
    <div id="workout-view" class="view hidden">
        <header>
            <h1 id="active-title">Pass</h1>
            <div class="timer-container">
                <span id="workout-timer">00:00:00</span>
                <button id="timer-toggle-btn" class="timer-btn">Pausa ⏸️</button>
            </div>
        </header>
        <div id="exercise-list" class="exercise-list"></div>
        <div class="workout-actions">
            <button id="save-workout-btn" class="mode-btn green">Slutför & Spara</button>
            <button id="pause-workout-btn" class="mode-btn glass-border">Avbryt (Spara utkast)</button>
        </div>
    </div>

    <!-- PROGRAMS VIEW -->
    <div id="programs-view" class="view hidden">
        <header>
            <h1>PROGRAM</h1>
            <button id="add-custom-pass-btn" class="mode-btn blue" style="width:auto; padding:10px 20px;">+ Nytt pass</button>
        </header>
        <div id="pass-selector-list" class="pass-selector"></div>
        <div id="program-details-area" class="hidden" style="margin-top:20px; padding:0 20px;">
            <div id="program-exercise-list" class="card glass"></div>
        </div>
    </div>

    <!-- EXERCISES VIEW (BANKEN) -->
    <div id="exercises-view" class="view hidden">
        <header>
            <h1>ÖVNINGSBANK</h1>
            <button class="mode-btn blue" onclick="openCreateExerciseModal()">+ Skapa ny övning</button>
        </header>
        <div class="category-scroll">
            <button class="cat-btn active" data-cat="Ben" onclick="filterExercises('Ben')">BEN</button>
            <button class="cat-btn" data-cat="Bröst" onclick="filterExercises('Bröst')">BRÖST</button>
            <button class="cat-btn" data-cat="Rygg" onclick="filterExercises('Rygg')">RYGG</button>
            <button class="cat-btn" data-cat="Axlar" onclick="filterExercises('Axlar')">AXLAR</button>
            <button class="cat-btn" data-cat="Armar" onclick="filterExercises('Armar')">ARMAR</button>
            <button class="cat-btn" data-cat="Bål" onclick="filterExercises('Bål')">BÅL</button>
        </div>
        <div id="exercise-results" style="padding:20px;"></div>
    </div>

    <!-- STATS VIEW -->
    <div id="stats-view" class="view hidden">
        <header><h1>STATISTIK</h1></header>
        <div class="card glass" style="margin:20px; padding:20px;">
            <h3>Pass per månad</h3>
            <div id="chart-container" class="chart-container"></div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="workout-modal" class="modal hidden">
        <div class="modal-content glass">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav class="main-nav">
        <button id="calendar-mode">📅 Schema</button>
        <button id="view-programs-btn">🏆 Program</button>
        <button id="view-exercises-btn">🏋️ Bank</button>
        <button id="stats-mode">📊 Stats</button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
