<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LIFT - Premium Workout Companion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glows">
        <div class="glow cyan"></div>
        <div class="glow violet"></div>
    </div>

    <main class="app-container">
        <!-- HOME VIEW -->
        <section id="home-view" class="view">
            <header class="hero-section">
                <h1 class="main-title">LIFT</h1>
                <div class="subtitle-container">
                    <span class="line"></span>
                    <p class="subtitle">PREMIUM WORKOUT</p>
                    <span class="line"></span>
                </div>
            </header>

            <div id="draft-alert" class="card glass hidden">
                <div class="draft-badge">PÅGÅENDE PASS</div>
                <h3>Du har ett aktivt utkast</h3>
                <p>Fortsätt där du slutade eller avsluta passet.</p>
                <button id="resume-workout-btn" class="mode-btn green glow-green">Återuppta pass 🔥</button>
            </div>

            <button id="start-new-btn" class="mode-btn blue glow-blue hero-action-btn">
                <span class="btn-icon">⚡</span> STARTA TRÄNINGSPASSET
            </button>

            <div class="menu-grid">
                <button id="calendar-mode" class="mode-btn glass-border">
                    <span class="mode-icon">📅</span>
                    <div class="mode-text-wrapper">
                        <span class="mode-title">Kalender</span>
                        <span class="mode-desc">Planera & logga</span>
                    </div>
                </button>
                <button id="view-exercises-btn" class="mode-btn glass-border">
                    <span class="mode-icon">💪</span>
                    <div class="mode-text-wrapper">
                        <span class="mode-title">Övningar</span>
                        <span class="mode-desc">Se din bank</span>
                    </div>
                </button>
                <button id="view-programs-btn" class="mode-btn glass-border">
                    <span class="mode-icon">📋</span>
                    <div class="mode-text-wrapper">
                        <span class="mode-title">Träningspass</span>
                        <span class="mode-desc">Skapa & redigera</span>
                    </div>
                </button>
                <button id="stats-mode" class="mode-btn glass-border">
                    <span class="mode-icon">📊</span>
                    <div class="mode-text-wrapper">
                        <span class="mode-title">Statistik</span>
                        <span class="mode-desc">Följ din utveckling</span>
                    </div>
                </button>
            </div>
        </section>

        <!-- CALENDAR VIEW -->
        <section id="calendar-view" class="view hidden">
            <div class="view-header">
                <button class="icon-btn" onclick="renderHome()">« Meny</button>
                <h2 id="calendar-month-title" onclick="openMonthPicker()" class="clickable-title">Maj 2026 ▾</h2>
                <div class="nav-arrows">
                    <button onclick="changeMonth(-1)">◀</button>
                    <button onclick="changeMonth(1)">▶</button>
                </div>
            </div>
            
            <div class="calendar-container card glass">
                <div class="weekdays-grid">
                    <div>Mån</div><div>Tis</div><div>Ons</div><div>Tors</div><div>Fre</div><div>Lör</div><div>Sön</div>
                </div>
                <div id="calendar-days" class="days-grid"></div>
            </div>
            
            <div class="calendar-legend card glass">
                <div class="legend-item"><span class="dot green"></span>Klar</div>
                <div class="legend-item"><span class="dot primary"></span>Planerad</div>
                <div class="legend-item"><span class="dot yellow"></span>Ändrad</div>
                <div class="legend-item"><span class="dot gray"></span>Vila</div>
            </div>
        </section>

        <!-- WORKOUT VIEW -->
        <section id="workout-view" class="view hidden">
            <div class="view-header">
                <h2 id="active-title" class="modern-header">Pass</h2>
                <div id="workout-timer" class="timer-badge">00:00:00</div>
            </div>
            <div id="exercise-list" class="exercise-cards-container"></div>
            <div class="workout-footer card glass">
                <button id="pause-workout-btn" class="mode-btn glass-border">Spara utkast 💾</button>
                <button id="save-workout-btn" class="mode-btn green glow-green">Slutför pass 🎉</button>
            </div>
        </section>

        <!-- EXERCISES BANK VIEW -->
        <section id="exercises-view" class="view hidden">
            <div class="view-header">
                <button class="icon-btn" onclick="renderHome()">« Meny</button>
                <h2 class="modern-header">Övningsbank</h2>
                <span></span>
            </div>
            <div id="exercise-bank-categories" class="category-scroll"></div>
            <div id="exercise-bank-list" class="bank-list-container"></div>
        </section>

        <!-- PROGRAMS VIEW -->
        <section id="programs-view" class="view hidden">
            <div class="view-header">
                <button class="icon-btn" onclick="renderHome()">« Meny</button>
                <h2 class="modern-header">Dina Pass</h2>
                <button id="add-custom-pass-btn" class="icon-btn primary-text">+ Nytt</button>
            </div>
            <div id="pass-selector-list" class="program-grid"></div>
            <div id="program-details-area" class="card glass hidden" style="margin-top:20px; padding:20px;">
                <div id="program-exercise-list"></div>
            </div>
        </section>

        <!-- STATS VIEW -->
        <section id="stats-view" class="view hidden">
            <div class="view-header">
                <button class="icon-btn" onclick="renderHome()">« Meny</button>
                <h2 class="modern-header">Statistik</h2>
                <span></span>
            </div>
            <div class="card glass" style="padding:20px; text-align:center;">
                <p class="subtitle" style="margin-bottom:20px;">Träningspass per månad</p>
                <div id="chart-container" class="chart-flex"></div>
            </div>
        </section>
    </main>

    <!-- GLOBAL MODAL BACKDROP -->
    <div id="global-modal" class="modal-backdrop hidden" onclick="closeModal()">
        <div class="modal-content glass" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- BOTTOM GLOBAL NAV BAR -->
    <nav class="bottom-nav-bar">
        <button id="global-home" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Hem</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
