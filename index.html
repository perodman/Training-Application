<div id="calendar-view" class="view hidden">
  <div class="calendar-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
    <h2 id="month-label" style="margin:0;">Maj 2026</h2>
    <button class="nav-btn" onclick="changeMonth(1)">❯</button>
  </div>
  <div class="card">
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>
</div>

<!-- Modal för att visa passinformation när man klickar i kalendern -->
<div id="workout-modal" class="modal hidden">
  <div class="modal-content">
    <div id="modal-body"></div>
    <button class="mode-btn gray" onclick="closeModal()" style="margin-top:20px;">Stäng</button>
  </div>
</div>
