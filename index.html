<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Progressive</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div id="home-view" class="view">
            <header class="main-header">
                <div class="logo">PROGRESSIVE</div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="renderCalendar(true)">
                        <span class="btn-inner">Starta Träningspass</span>
                    </button>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card glass">
                    <span class="stat-label">PASS DENNA VECKA</span>
                    <span class="stat-value" id="stats-week">0</span>
                </div>
                <div class="stat-card glass">
                    <span class="stat-label">TOTALT ANTAL PASS</span>
                    <span class="stat-value" id="stats-total">0</span>
                </div>
            </div>

            <section class="next-workout">
                <h2 class="section-title">Ditt nästa pass</h2>
                <div id="next-workout-card" class="card glass">Laddar...</div>
            </section>
        </div>

        <div id="calendar-view" class="view hidden">
            <div class="view-header">
                <button class="back-btn" onclick="renderHome()">←</button>
                <h2 class="view-title">TRÄNINGSSCHEMA</h2>
                <div style="width:40px;"></div>
            </div>
            
            <div id="calendar-info-box"></div>

            <div class="calendar-nav">
                <button onclick="changeMonth(-1)">‹</button>
                <h3 id="month-label" onclick="openMonthPicker()">Maj 2026</h3>
                <button onclick="changeMonth(1)">›</button>
            </div>
            <div class="calendar-grid-header">
                <span>MÅN</span><span>TIS</span><span>ONS</span><span>TOR</span><span>FRE</span><span>LÖR</span><span>SÖN</span>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
        </div>

        <div id="programs-view" class="view hidden">
            <div class="view-header">
                <button class="back-btn" onclick="renderHome()">←</button>
                <h2 class="view-title">MINA PROGRAM</h2>
                <button class="add-btn-circle" onclick="openCreateProgramModal()">+</button>
            </div>
            <div class="pass-selector" id="pass-selector-list"></div>
            <div id="program-details-area" class="program-details-container hidden">
                <div id="program-exercise-list" class="exercise-list-minimal"></div>
            </div>
        </div>

        <div id="bank-view" class="view hidden">
            <div class="view-header">
                <button class="back-btn" onclick="renderHome()">←</button>
                <h2 class="view-title">ÖVNINGSBANK</h2>
                <button class="add-btn-circle" onclick="openCreateExerciseModal()">+</button>
            </div>
            <div class="category-scroll">
                <button class="cat-btn active" data-cat="Ben" onclick="filterExercises('Ben')">BEN</button>
                <button class="cat-btn" data-cat="Bröst" onclick="filterExercises('Bröst')">BRÖST</button>
                <button class="cat-btn" data-cat="Rygg" onclick="filterExercises('Rygg')">RYGG</button>
                <button class="cat-btn" data-cat="Axlar" onclick="filterExercises('Axlar')">AXLAR</button>
                <button class="cat-btn" data-cat="Armar" onclick="filterExercises('Armar')">ARMAR</button>
                <button class="cat-btn" data-cat="Bål" onclick="filterExercises('Bål')">BÅL</button>
            </div>
            <div id="exercise-results" class="exercise-results"></div>
        </div>

        <div id="workout-view" class="view hidden">
            <div class="workout-header">
                <div id="active-header-row" style="display:flex; justify-content:space-between; align-items:center; width:100%; margin-bottom:15px;">
                    <h2 id="active-title" class="section-title modern-header" style="margin-bottom:0;">PASS A</h2>
                </div>
                <div id="timer-card" class="timer-card glass">
                    <div class="timer-label">AKTIV TID</div>
                    <div id="workout-timer" class="timer-value">00:00:00</div>
                    <button id="timer-toggle-btn" class="mode-btn">Pausa ⏸️</button>
                </div>
            </div>
            <div id="exercise-list"></div>
            <div class="workout-footer">
                <button id="pause-workout-btn" class="mode-btn glass-border">Pausa & Spara Utkast</button>
                <button class="mode-btn blue" onclick="finishWorkout()">AVSLUTA PASS 🏆</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <button onclick="renderHome()" class="nav-item">🏠<span>Hem</span></button>
            <button onclick="renderCalendar()" class="nav-item">📅<span>Schema</span></button>
            <button onclick="renderProgramView()" class="nav-item">💪<span>Program</span></button>
            <button onclick="filterExercises('Ben')" class="nav-item">📚<span>Bank</span></button>
        </nav>

        <div id="workout-modal" class="modal hidden">
            <div class="modal-content glass">
                <button class="close-modal" onclick="closeModal()">×</button>
                <div id="modal-body"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
